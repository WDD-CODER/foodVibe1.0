@if (isOpen_()) {
<div class="c-modal-overlay" (click)="resetAndClose()">
  <div class="c-modal-card c-modal-card--md" dir="rtl" (click)="$event.stopPropagation()" (clickOutside)="resetAndClose()">
    <h3>{{ title_() | translatePipe }}</h3>

    <div class="c-modal-body">
      <div class="c-input-stack full-width">
        <label>{{ firstFieldLabelKey_() | translatePipe }}</label>
        <input #hebrewInput
               type="text"
               [ngModel]="hebrewLabel_()"
               (ngModelChange)="updateHebrew($event)"
               [placeholder]="context_() === 'category' ? ('general.category_placeholder' | translatePipe) : ('hebrew_value' | translatePipe)"
               aria-describedby="hebrew-hint" />
        @if (context_() === 'generic') {
        <span id="hebrew-hint" class="translation-key-modal-hint">{{ 'enter_english_key_for_value_above' | translatePipe }}</span>
        }
      </div>
      <div class="c-input-stack full-width">
        <label>{{ 'english_key_label' | translatePipe }}</label>
        <input #englishKeyInput
               type="text"
               [ngModel]="englishKey_()"
               (ngModelChange)="englishKey_.set($event); validationError_.set(null)"
               placeholder="olive_oil"
               (keydown.enter)="save()" />
        @if (validationError_()) {
        <span class="translation-key-validation-error">{{ validationError_() }}</span>
        }
      </div>
    </div>

    <div class="c-modal-actions">
      <button type="button" class="c-btn-ghost" (click)="cancel()">{{ 'cancel' | translatePipe }}</button>
      @if (context_() === 'generic') {
      <button type="button" class="c-btn-ghost" (click)="continueWithoutSaving()">{{ 'continue_without_saving' | translatePipe }}</button>
      }
      <button type="button" class="c-btn-primary"
              (click)="save()"
              [disabled]="!englishKey_().trim() || !hebrewLabel_().trim()">
        {{ saveLabelKey_() | translatePipe }}
      </button>
    </div>
  </div>
</div>
}
