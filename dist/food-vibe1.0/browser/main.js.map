@if (isOpen_()) {
<div class="c-modal-overlay" (click)="resetAndClose()">
  <div class="c-modal-card" dir="rtl" (click)="$event.stopPropagation()">
    <h3>{{ 'add_equipment' | translatePipe }}</h3>

    <div class="c-modal-body">
      <div class="c-input-stack">
        <label>{{ 'equipment_name' | translatePipe }}</label>
        <input type="text"
               [ngModel]="name_()"
               (ngModelChange)="name_.set($event)"
               [placeholder]="'equipment_name' | translatePipe"
               (keydown.enter)="save()" />
      </div>

      <div class="c-input-stack">
        <label>{{ 'category' | translatePipe }}</label>
        <app-custom-select
          [ngModel]="category_()"
          (ngModelChange)="onCategoryChange($event)"
          [options]="categoryOptions()"
          [placeholder]="'category'"
          [typeToFilter]="true"
          [addNewValue]="'__add_new__'"
          [translateLabels]="true" />
      </div>
    </div>

    <div class="c-modal-actions">
      <button type="button" class="c-btn-ghost" (click)="cancel()">{{ 'cancel' | translatePipe }}</button>
      <button type="button" class="c-btn-primary"
              (click)="save()"
              [disabled]="!name_().trim()">
        {{ 'save' | translatePipe }}
      </button>
    </div>
  </div>
</div>
}
