@if (msg_(); as msg) {
  <div class="user-msg" [ngClass]="msg.type" (click)="onCloseMsg($event)">
    <p>{{ msg.txt }}</p>
    @if (msg.undo) {
      <button type="button" class="undo-btn" (click)="onUndo($event, msg.undo)">
        {{ 'undo' | translatePipe }}
      </button>
    }
  </div>
}
