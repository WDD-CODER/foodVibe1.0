@if (isOpen_()) {
<div class="c-modal-overlay" (click)="resetAndClose()">
  <div class="c-modal-card" dir="rtl" (click)="$event.stopPropagation()" (clickOutside)="resetAndClose()">
    @if (config(); as cfg) {
    <h3>{{ cfg.title | translatePipe }}</h3>

    <div class="c-modal-body">
      <div class="c-input-stack full-width">
        <label>{{ cfg.label | translatePipe }}</label>
        <input type="text"
               [ngModel]="value_()"
               (ngModelChange)="value_.set($event)"
               [placeholder]="(cfg.placeholder || cfg.label) | translatePipe"
               (keydown.enter)="save()" />
      </div>
    </div>

    <div class="c-modal-actions">
      <button type="button" class="c-btn-ghost" (click)="cancel()">{{ 'cancel' | translatePipe }}</button>
      <button type="button" class="c-btn-primary"
              (click)="save()"
              [disabled]="!value_().trim()">
        {{ cfg.saveLabel | translatePipe }}
      </button>
    </div>
    }
  </div>
</div>
}
