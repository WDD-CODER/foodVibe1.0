<div class="list-container" [class.panel-open]="isPanelOpen()" [attr.dir]="dir()">
  <header class="list-header">
    <div class="header-start">
      @if (!isPanelOpen()) {
        <button type="button" class="open-panel-btn" (click)="panelToggle.emit()" aria-label="Toggle filters">
          <lucide-icon name="menu" [size]="24"></lucide-icon>
        </button>
      }
      <ng-content select="[shell-title]"></ng-content>
    </div>
    <div class="header-spacer"></div>
    <div class="header-search">
      <ng-content select="[shell-search]"></ng-content>
    </div>
    <div class="header-spacer"></div>
    <div class="header-actions">
      <ng-content select="[shell-actions]"></ng-content>
    </div>
  </header>

  <section class="table-area">
    <div class="table-header">
      <ng-content select="[shell-table-header]"></ng-content>
    </div>
    <div class="table-body">
      <ng-content select="[shell-table-body]"></ng-content>
    </div>
  </section>

  <div
    class="panel-backdrop"
    [class.visible]="isPanelOpen()"
    (click)="panelToggle.emit()"
    aria-hidden="true">
  </div>

  <aside class="filter-panel" [class.collapsed]="!isPanelOpen()">
    @if (isPanelOpen()) {
      <button type="button" class="panel-toggle-icon" (click)="panelToggle.emit()" aria-label="Close filters">
        <lucide-icon name="circle-x" [size]="20"></lucide-icon>
      </button>
    }
    <div class="panel-content">
      <ng-content select="[shell-filters]"></ng-content>
    </div>
  </aside>
</div>
