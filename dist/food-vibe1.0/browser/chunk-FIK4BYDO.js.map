<div class="carousel-cell">
  <span class="carousel-label" aria-hidden="true">{{ getCurrentLabel() }}</span>
  <ng-content></ng-content>
  <button type="button" class="carousel-arrow carousel-arrow-prev" (click)="prev(); $event.stopPropagation()" aria-label="Previous slide">
    <lucide-icon name="chevron-right" [size]="14"></lucide-icon>
  </button>
  <button type="button" class="carousel-arrow carousel-arrow-next" (click)="next(); $event.stopPropagation()" aria-label="Next slide">
    <lucide-icon name="chevron-left" [size]="14"></lucide-icon>
  </button>
</div>
