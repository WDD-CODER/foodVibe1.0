<div class="list-row-checkbox" (click)="onCheckboxClick($event)" role="button" tabindex="0" (keydown.enter)="onCheckboxClick($event)" (keydown.space)="$event.preventDefault(); onCheckboxClick($event)">
  <input
    type="checkbox"
    [checked]="checked()"
    [disabled]="disabled()"
    [attr.aria-label]="checked() ? 'Deselect row' : 'Select row'"
    tabindex="-1"
  />
</div>
