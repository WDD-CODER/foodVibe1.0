services:
  - type: web
    name: foodvibe
    runtime: node
    plan: free
    buildCommand: npm ci && npm install --prefix server && npm run build:render
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://foodvibe1-0-1.onrender.com
