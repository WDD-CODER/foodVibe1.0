services:
  - type: web
    name: foodvibe-server
    runtime: node
    buildCommand: npm install && npx ng build --configuration production && cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_REMOTE_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://foodvibe-server.onrender.com
