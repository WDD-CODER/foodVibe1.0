services:
  - type: web
    name: foodvibe-server
    runtime: node
    buildCommand: npm run build && npm install --prefix server
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://foodvibe1-0-1.onrender.com,http://localhost:4200
