name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install root
        run: npm ci
      - name: Install server
        run: npm ci
        working-directory: server
      - name: npm audit (root)
        run: npm audit --audit-level=high
      - name: npm audit (server)
        run: npm audit --audit-level=high
        working-directory: server
      - name: Semgrep OWASP Top Ten
        uses: semgrep/semgrep-action@v1
        with:
          config: p/owasp-top-ten
