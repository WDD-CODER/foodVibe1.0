@if (modalService.isOpen()) {
  <div class="c-modal-overlay" (click)="modalService.close()">
    <div class="c-modal-card text-import-modal-card" dir="rtl" (click)="$event.stopPropagation()">

      <div class="text-import-header">
        <h2 class="text-import-title">{{ 'import_text_modal_title' | translatePipe }}</h2>
        <button type="button" class="c-icon-btn" (click)="modalService.close()">
          <lucide-icon name="x" [size]="20"></lucide-icon>
        </button>
      </div>

      @if (pendingResult_()) {
        <!-- Low-confidence warning banner -->
        <div class="text-import-confidence-warning">
          <lucide-icon name="alert-triangle" [size]="18"></lucide-icon>
          <span>{{ 'import_text_low_confidence' | translatePipe }}</span>
          <div class="confidence-override-actions">
            <button type="button" class="c-btn-ghost confidence-btn" (click)="onOverrideType('recipe')">
              {{ 'preparation' | translatePipe }}
            </button>
            <button type="button" class="c-btn-ghost confidence-btn" (click)="onOverrideType('dish')">
              {{ 'dish' | translatePipe }}
            </button>
            <button type="button" class="c-btn-primary confidence-btn" (click)="onConfirmDetected()">
              {{ 'import_text_confirm_detected' | translatePipe }}
              ({{ (pendingResult_()!.type === 'recipe' ? 'preparation' : 'dish') | translatePipe }})
            </button>
          </div>
        </div>
      } @else {
        <!-- Main text input panel -->
        <div class="text-import-body">
          <textarea
            class="text-import-textarea"
            dir="auto"
            [placeholder]="'import_text_placeholder' | translatePipe"
            [value]="rawText_()"
            (input)="rawText_.set($any($event.target).value)"
            rows="10"
            [disabled]="state_() === 'loading'"
          ></textarea>

          @if (state_() === 'error') {
            <p class="text-import-error">
              <lucide-icon name="alert-circle" [size]="16"></lucide-icon>
              {{ 'import_text_error' | translatePipe }}
            </p>
          }
        </div>

        <div class="text-import-footer">
          <button type="button" class="c-btn-ghost" (click)="modalService.close()">
            {{ 'cancel' | translatePipe }}
          </button>

          @if (state_() === 'error') {
            <button type="button" class="c-btn-primary" (click)="onRetry()">
              {{ 'retry' | translatePipe }}
            </button>
          } @else {
            <button
              type="button"
              class="c-btn-primary"
              [disabled]="!rawText_().trim() || state_() === 'loading'"
              (click)="onParse()"
            >
              @if (state_() === 'loading') {
                <app-loader size="small" [inline]="true" />
              } @else {
                <lucide-icon name="scan-text" [size]="16"></lucide-icon>
              }
              {{ (state_() === 'loading' ? 'import_text_parsing' : 'import_text_parse_btn') | translatePipe }}
            </button>
          }
        </div>
      }

    </div>
  </div>
}
