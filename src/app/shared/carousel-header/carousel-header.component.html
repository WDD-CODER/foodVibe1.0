<ng-content></ng-content>
<div class="carousel-header-label">{{ getCurrentLabel() | translatePipe }}</div>
<button type="button" class="carousel-header-arrow prev"
  (click)="prev(); $event.stopPropagation()" aria-label="Previous column">
  <lucide-icon name="chevron-right" [size]="14"></lucide-icon>
</button>
<button type="button" class="carousel-header-arrow next"
  (click)="next(); $event.stopPropagation()" aria-label="Next column">
  <lucide-icon name="chevron-left" [size]="14"></lucide-icon>
</button>
