@if (modalService.isOpen()) {
  <div class="c-modal-overlay" (click)="modalService.choose(null)">
    <div class="c-modal-card c-modal-card--fluid" dir="rtl" (click)="$event.stopPropagation()">
      <h3>{{ 'category_change_prompt' | translatePipe }}</h3>
      <p class="global-specific-detail">
        {{ modalService.config()?.preparationName }}: {{ modalService.config()?.mainCategory | translatePipe }} → {{ modalService.config()?.newCategory | translatePipe }}
      </p>
      <div class="c-modal-actions">
        <button type="button" class="c-btn-ghost" (click)="modalService.choose(null)">
          {{ 'cancel' | translatePipe }}
        </button>
        <button type="button" class="global-specific-btn-secondary" (click)="modalService.choose('specific')">
          {{ 'add_as_specific' | translatePipe }}
        </button>
        <button type="button" class="c-btn-primary" (click)="modalService.choose('global')">
          {{ 'change_global' | translatePipe }}
        </button>
      </div>
    </div>
  </div>
}
