<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- v3 iter3: SKILL.md adds vein hierarchy — central vein + 7 branch veins -->
  <!-- 7 lobes, serrated edges, symmetric, central vein + branch veins -->

  <!-- LEAF OUTLINE: 7 symmetric serrated lobes via single path -->
  <path d="
    M 100 150
    L 88 138 L 72 136 L 68 120 L 76 116
    L 58 110 L 50 94  L 60 88  L 55 72  L 67 70  L 64 56  L 76 54
    L 73 38  L 84 40  L 82 26  L 91 30  L 89 18
    L 100 15
    L 111 18 L 109 30 L 118 26 L 116 40 L 127 38
    L 124 54 L 136 56 L 133 70 L 145 72 L 140 88 L 150 94
    L 142 110 L 124 116 L 132 120 L 128 136 L 112 138
    Z"
    fill="#4a7c3f"
    stroke="#2d5a2d"
    stroke-width="1.5"
  />

  <!-- Serration marks on each lobe edge (small notches via additional paths) -->
  <!-- Left lobes -->
  <path d="M 82 100 L 79 97 L 76 100 L 73 97 L 70 100" fill="none" stroke="#2d5a2d" stroke-width="0.8"/>
  <path d="M 70 78 L 67 75 L 64 78 L 61 75 L 58 78" fill="none" stroke="#2d5a2d" stroke-width="0.8"/>
  <path d="M 83 50 L 80 47 L 77 50 L 74 47 L 71 50" fill="none" stroke="#2d5a2d" stroke-width="0.8"/>
  <!-- Right lobes (mirror) -->
  <path d="M 118 100 L 121 97 L 124 100 L 127 97 L 130 100" fill="none" stroke="#2d5a2d" stroke-width="0.8"/>
  <path d="M 130 78 L 133 75 L 136 78 L 139 75 L 142 78" fill="none" stroke="#2d5a2d" stroke-width="0.8"/>
  <path d="M 117 50 L 120 47 L 123 50 L 126 47 L 129 50" fill="none" stroke="#2d5a2d" stroke-width="0.8"/>

  <!-- CENTRAL VEIN: from stem base (100,148) to top lobe tip (100,16) -->
  <line x1="100" y1="148" x2="100" y2="16" stroke="#1e4a1e" stroke-width="1.2"/>

  <!-- BRANCH VEINS: one into each of the 7 lobes -->
  <!-- Center lobe top -->
  <line x1="100" y1="50" x2="100" y2="20" stroke="#1e4a1e" stroke-width="0.8"/>
  <!-- Upper-left lobe -->
  <line x1="100" y1="60" x2="82" y2="35" stroke="#1e4a1e" stroke-width="0.8"/>
  <!-- Upper-right lobe -->
  <line x1="100" y1="60" x2="118" y2="35" stroke="#1e4a1e" stroke-width="0.8"/>
  <!-- Mid-left lobe -->
  <line x1="100" y1="85" x2="65" y2="72" stroke="#1e4a1e" stroke-width="0.8"/>
  <!-- Mid-right lobe -->
  <line x1="100" y1="85" x2="135" y2="72" stroke="#1e4a1e" stroke-width="0.8"/>
  <!-- Lower-left lobe -->
  <line x1="100" y1="115" x2="62" y2="108" stroke="#1e4a1e" stroke-width="0.8"/>
  <!-- Lower-right lobe -->
  <line x1="100" y1="115" x2="138" y2="108" stroke="#1e4a1e" stroke-width="0.8"/>

  <!-- STEM -->
  <line x1="100" y1="150" x2="100" y2="185" stroke="#2d5a2d" stroke-width="3"/>
</svg>
