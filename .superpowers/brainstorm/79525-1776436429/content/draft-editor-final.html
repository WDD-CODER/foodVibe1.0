<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Draft Editor — Liquid Glass</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Heebo', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 600px 400px at 15% 20%, rgba(20,184,166,0.12), transparent),
      radial-gradient(ellipse 500px 500px at 80% 70%, rgba(251,191,36,0.08), transparent),
      radial-gradient(ellipse 400px 300px at 50% 50%, rgba(14,165,233,0.06), transparent);
    pointer-events: none;
  }

  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding: 2rem 1rem;
    width: 100%;
  }

  .label-top {
    font-size: 0.8rem;
    color: #64748b;
    font-weight: 500;
    letter-spacing: .3px;
  }

  /* ── Modal overlay backdrop ── */
  .modal-backdrop {
    position: relative;
    width: min(480px, 94vw);
    background: rgba(15,23,42,0.35);
    border-radius: 1.5rem;
    padding: 2.5rem;
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Modal card ── */
  .modal-card {
    width: 100%;
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(255,255,255,0.45);
    border-radius: 1.25rem;
    box-shadow: 0 16px 48px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Modal header ── */
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid rgba(226,232,240,0.6);
  }

  .modal-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: #0f172a;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .close-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 2rem;
    height: 2rem;
    border: none;
    background: none;
    color: #94a3b8;
    border-radius: 0.5rem;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.15s, color 0.15s;
  }
  .close-btn:hover { background: rgba(241,245,249,0.8); color: #0f172a; }

  /* ── Editor body ── */
  .editor-body {
    padding: 0.875rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.875rem;
    max-height: 440px;
    overflow-y: auto;
  }

  /* ── Glass inputs ── */
  .c-input {
    padding: 0.5rem 0.75rem;
    background: rgba(255,255,255,0.55);
    color: #0f172a;
    font-size: 0.875rem;
    font-family: 'Heebo', sans-serif;
    border: 1px solid rgba(226,232,240,0.6);
    border-radius: 0.75rem;
    backdrop-filter: blur(16px);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    direction: rtl;
  }
  .c-input:focus {
    border-color: rgba(20,184,166,0.5);
    box-shadow: 0 0 0 3px rgba(20,184,166,0.2);
  }
  .c-input.name-field {
    flex: 1;
    font-weight: 600;
    font-size: 1rem;
  }
  .c-input.num-field { width: 62px; text-align: center; }
  .c-input.compact { font-size: 0.8125rem; padding: 0.375rem 0.625rem; }

  /* ── Glass select ── */
  .c-select {
    padding: 0.5rem 0.75rem;
    background: rgba(255,255,255,0.55);
    color: #0f172a;
    font-size: 0.875rem;
    font-family: 'Heebo', sans-serif;
    border: 1px solid rgba(226,232,240,0.6);
    border-radius: 0.75rem;
    backdrop-filter: blur(16px);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    direction: rtl;
  }
  .c-select:focus {
    border-color: rgba(20,184,166,0.5);
    box-shadow: 0 0 0 3px rgba(20,184,166,0.2);
  }
  .c-select.type-select { min-width: 80px; }
  .c-select.unit-select { min-width: 72px; font-size: 0.8125rem; padding: 0.375rem 0.5rem; }

  /* ── Row layouts ── */
  .header-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .yield-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .field-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: #64748b;
    white-space: nowrap;
  }

  /* ── Section ── */
  .section-title {
    font-size: 0.75rem;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: .5px;
    margin: 0 0 0.4rem;
  }

  /* ── Ingredient table ── */
  .ing-table {
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(226,232,240,0.6);
    border-radius: 0.75rem;
    overflow: hidden;
    background: rgba(255,255,255,0.35);
  }

  .ing-row {
    display: grid;
    grid-template-columns: 1fr 60px 78px 28px;
    align-items: center;
    gap: 0.375rem;
    padding: 0.375rem 0.5rem;
    border-bottom: 1px solid rgba(241,245,249,0.5);
    transition: background 0.15s;
  }
  .ing-row:last-child { border-bottom: none; }
  .ing-row:hover { background: rgba(20,184,166,0.06); }

  .ing-row .c-input,
  .ing-row .c-select {
    border-radius: 0.5rem;
    padding: 0.3rem 0.5rem;
    font-size: 0.8125rem;
  }

  /* New (unlinked) ingredient row */
  .ing-row--new { background: rgba(254,243,199,0.45) !important; }
  .ing-row--new .c-input { border-color: rgba(245,158,11,0.35); }
  .ing-row--new .c-select { border-color: rgba(245,158,11,0.35); }

  .new-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.1rem 0.45rem;
    background: rgba(254,243,199,0.9);
    border: 1px solid #f59e0b;
    border-radius: 999px;
    font-size: 0.65rem;
    font-weight: 700;
    color: #92400e;
    white-space: nowrap;
  }

  /* ── Del button ── */
  .del-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 1.6rem;
    height: 1.6rem;
    border: 1px solid rgba(226,232,240,0.6);
    border-radius: 50%;
    background: none;
    color: #94a3b8;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .del-btn:hover { background: #dc2626; border-color: #dc2626; color: #fff; }

  /* ── Add row ── */
  .add-row {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    color: #14b8a6;
    font-size: 0.8125rem;
    font-weight: 600;
    cursor: pointer;
    padding: 0.375rem 0.5rem;
    border-radius: 0.5rem;
    transition: background 0.15s;
    width: fit-content;
  }
  .add-row:hover { background: rgba(20,184,166,0.08); }

  /* ── Steps ── */
  .steps-list {
    display: flex;
    flex-direction: column;
    gap: 0.375rem;
  }

  .step-row {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
  }

  .step-num {
    font-size: 0.75rem;
    font-weight: 700;
    color: #14b8a6;
    min-width: 1.25rem;
    padding-top: 0.5rem;
    text-align: center;
  }

  .step-input {
    flex: 1;
    padding: 0.4rem 0.625rem;
    background: rgba(255,255,255,0.55);
    color: #0f172a;
    font-size: 0.8125rem;
    font-family: 'Heebo', sans-serif;
    border: 1px solid rgba(226,232,240,0.6);
    border-radius: 0.625rem;
    backdrop-filter: blur(16px);
    outline: none;
    resize: none;
    line-height: 1.5;
    transition: border-color 0.2s, box-shadow 0.2s;
    direction: rtl;
  }
  .step-input:focus {
    border-color: rgba(20,184,166,0.5);
    box-shadow: 0 0 0 3px rgba(20,184,166,0.2);
  }

  /* ── Modal footer ── */
  .modal-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    padding: 0.75rem 1.25rem 1rem;
    border-top: 1px solid rgba(226,232,240,0.6);
  }

  .c-btn-ghost {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.625rem 1.25rem;
    background: rgba(255,255,255,0.55);
    color: #1e293b;
    font-weight: 500;
    font-size: 0.875rem;
    font-family: 'Heebo', sans-serif;
    border: 1px solid rgba(226,232,240,0.6);
    border-radius: 0.75rem;
    backdrop-filter: blur(16px);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
  }
  .c-btn-ghost:hover { background: rgba(255,255,255,0.82); border-color: rgba(203,213,225,0.7); }

  .c-btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.625rem 1.25rem;
    background: #14b8a6;
    color: #fff;
    font-weight: 600;
    font-size: 0.875rem;
    font-family: 'Heebo', sans-serif;
    border: none;
    border-radius: 0.75rem;
    box-shadow: 0 0 20px rgba(20,184,166,0.15);
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
  }
  .c-btn-primary:hover { background: #0d9488; box-shadow: 0 0 24px rgba(20,184,166,0.3); transform: translateY(-1px); }

  /* ── Type badge (in header area) ── */
  .type-badge-soft {
    padding: 0.1rem 0.5rem;
    border-radius: 0.25rem;
    background: rgba(20,184,166,0.12);
    color: #14b8a6;
    font-size: 0.75rem;
    font-weight: 500;
  }

  /* Scrollbar */
  .editor-body::-webkit-scrollbar { width: 4px; }
  .editor-body::-webkit-scrollbar-track { background: transparent; }
  .editor-body::-webkit-scrollbar-thumb { background: rgba(20,184,166,0.25); border-radius: 99px; }
</style>
</head>
<body>
<div class="scene">
  <p class="label-top">✦ AiDraftEditorComponent — Liquid Glass design system</p>

  <div class="modal-backdrop">
    <div class="modal-card">

      <!-- Header -->
      <div class="modal-header">
        <h2 class="modal-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#14b8a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.94 13.5 8 18l4.5-1.94"/><path d="M12.01 2a10 10 0 1 0 10 10"/><path d="M18 2l4 4-8.5 8.5-4 1 1-4z"/></svg>
          הוספת מתכון עם AI
        </h2>
        <button class="close-btn">✕</button>
      </div>

      <!-- Body -->
      <div class="editor-body">

        <!-- Name + Type -->
        <div class="header-row">
          <input class="c-input name-field" value="שניצל עוף קלאסי" placeholder="שם המתכון" />
          <select class="c-select type-select">
            <option>מנה</option>
            <option>הכנה</option>
          </select>
        </div>

        <!-- Yield -->
        <div class="yield-row">
          <span class="field-label">תפוקה:</span>
          <input class="c-input num-field compact" value="4" type="number" min="0" />
          <select class="c-select unit-select">
            <option>מנות</option>
            <option>גרם</option>
            <option>כוסות</option>
            <option>─────</option>
            <option>+ חדש</option>
          </select>
        </div>

        <!-- Ingredients -->
        <div>
          <p class="section-title">מרכיבים</p>
          <div class="ing-table">
            <div class="ing-row">
              <input class="c-input" value="חזה עוף" placeholder="שם מרכיב" />
              <input class="c-input num-field" value="500" type="number" />
              <select class="c-select unit-select"><option>גרם</option><option>ק״ג</option><option>+ חדש</option></select>
              <button class="del-btn" title="הסר">×</button>
            </div>
            <div class="ing-row">
              <input class="c-input" value="פירורי לחם" placeholder="שם מרכיב" />
              <input class="c-input num-field" value="150" type="number" />
              <select class="c-select unit-select"><option>גרם</option><option>+ חדש</option></select>
              <button class="del-btn" title="הסר">×</button>
            </div>
            <div class="ing-row">
              <input class="c-input" value="ביצים" placeholder="שם מרכיב" />
              <input class="c-input num-field" value="2" type="number" />
              <select class="c-select unit-select"><option>יח׳</option><option>+ חדש</option></select>
              <button class="del-btn" title="הסר">×</button>
            </div>
            <!-- New/unlinked ingredient -->
            <div class="ing-row ing-row--new">
              <input class="c-input" value="מלח שחור" placeholder="שם מרכיב" />
              <input class="c-input num-field" value="1" type="number" />
              <select class="c-select unit-select"><option>כפית</option><option>+ חדש</option></select>
              <span class="new-badge" title="מרכיב חדש — יוצג כלא מקושר בבונה">חדש</span>
            </div>
          </div>
          <div class="add-row">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            הוסף מרכיב
          </div>
        </div>

        <!-- Steps -->
        <div>
          <p class="section-title">שלבים</p>
          <div class="steps-list">
            <div class="step-row">
              <span class="step-num">1</span>
              <textarea class="step-input" rows="2">טחינו את חזה העוף עם תבלינים ויצרו קציצות שוות.</textarea>
              <button class="del-btn" style="margin-top:0.35rem">×</button>
            </div>
            <div class="step-row">
              <span class="step-num">2</span>
              <textarea class="step-input" rows="2">טבלו כל קציצה בביצה טרופה ואז בפירורי לחם.</textarea>
              <button class="del-btn" style="margin-top:0.35rem">×</button>
            </div>
            <div class="step-row">
              <span class="step-num">3</span>
              <textarea class="step-input" rows="2">טגנו בשמן עמוק כ-3 דקות מכל צד עד להשחמה.</textarea>
              <button class="del-btn" style="margin-top:0.35rem">×</button>
            </div>
            <div class="add-row">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              הוסף שלב
            </div>
          </div>
        </div>

      </div>

      <!-- Footer -->
      <div class="modal-footer">
        <button class="c-btn-ghost">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          צור מחדש
        </button>
        <button class="c-btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          פתח בבונה
        </button>
      </div>

    </div>
  </div>

  <p class="label-top" style="text-align:center; max-width:380px">
    Yellow row = ingredient added by user in preview (not yet in inventory).<br>
    It will show as <strong>unlinked</strong> after opening in the builder.
  </p>
</div>
</body>
</html>
